name = "kostos"
main = "worker/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

routes = [
	{ pattern = "kostos.shynewt.com", custom_domain = true }
]

[assets]
directory = "build"
binding = "ASSETS"
# We handle SPA fallback in worker/index.ts so unknown paths fall through to
# `200.html` (the SvelteKit static shell) rather than `index.html` (the
# prerendered landing, whose hydration data pins it to the `/` route).
not_found_handling = "none"

[[durable_objects.bindings]]
name = "SYNC_ROOM"
class_name = "SyncRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SyncRoom"]

[observability]
enabled = true
