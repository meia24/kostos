name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + deploy to Cloudflare
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://kostos.shynewt.com
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Test
        run: npm test

      - name: Build static bundle
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
