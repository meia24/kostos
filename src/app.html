<!doctype html>
<html lang="en" data-theme="dark" data-palette="lime">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#0a0c0a" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#f7f6f1" media="(prefers-color-scheme: light)" />
		<meta
			name="description"
			content="Kostos is a free group expense splitter. Share a token, split bills with friends, sync live across devices. No accounts, encrypted, open source."
		/>
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Kostos" />
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Kostos" />
		<meta property="og:title" content="Kostos · Group expense splitter, no accounts" />
		<meta
			property="og:description"
			content="Split bills with friends, sync live across devices. No accounts, end-to-end encrypted, open source."
		/>
		<meta property="og:image" content="%sveltekit.assets%/pwa-512x512.png" />
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="Kostos · Group expense splitter, no accounts" />
		<meta
			name="twitter:description"
			content="Split bills with friends, sync live across devices. No accounts, encrypted, open source."
		/>
		<meta name="twitter:image" content="%sveltekit.assets%/pwa-512x512.png" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="48x48" />
		<link rel="icon" href="%sveltekit.assets%/icon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon-180x180.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<script>
			// Apply persisted theme/palette before first paint to avoid flash.
			try {
				var t = localStorage.getItem('kostos:theme');
				var p = localStorage.getItem('kostos:palette');
				var r = document.documentElement;
				if (t === 'light' || t === 'dark') r.setAttribute('data-theme', t);
				if (p) r.setAttribute('data-palette', p);
			} catch (_) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
