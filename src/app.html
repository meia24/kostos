<!doctype html>
<html lang="en" data-theme="dark" data-palette="lime">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#0a0c0a" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#f7f6f1" media="(prefers-color-scheme: light)" />
		<meta name="description" content="Even out group expenses with just a token, no accounts needed." />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Kostos" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="48x48" />
		<link rel="icon" href="%sveltekit.assets%/icon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon-180x180.png" />
		<script>
			// Apply persisted theme/palette before first paint to avoid flash.
			try {
				var t = localStorage.getItem('kostos:theme');
				var p = localStorage.getItem('kostos:palette');
				var r = document.documentElement;
				if (t === 'light' || t === 'dark') r.setAttribute('data-theme', t);
				if (p) r.setAttribute('data-palette', p);
			} catch (_) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
